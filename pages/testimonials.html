<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Directory — ScholarPath</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css" />
  <style>
    .directory-hero { background: var(--navy) url('../assets/images/52691716023_b9f044c691_c.jpg') center/cover no-repeat; background-blend-mode: overlay; padding: 4rem 3rem; text-align: center; position: relative; }
    .directory-hero::before { content: ''; position: absolute; inset: 0; background: rgba(26,39,68,0.48); }
    .directory-hero > * { position: relative; z-index: 1; }
    .directory-hero h1 { font-family: 'Fraunces', serif; font-size: 2.8rem; color: #fff; margin-bottom: 1rem; }
    .directory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; padding: 4rem 3rem; max-width: 1200px; margin: 0 auto; }
    .school-card { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; transition: transform 0.2s, border-color 0.2s; text-decoration: none; color: inherit; }
    .school-card:hover { transform: translateY(-5px); border-color: var(--gold); }
    .school-card h3 { font-family: 'Fraunces', serif; font-size: 1.3rem; color: var(--navy); margin-bottom: 0.5rem; }
    .school-card p { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
    .card-footer { margin-top: 1.5rem; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 1rem; }
    .view-link { color: var(--gold); font-weight: 600; font-size: 0.85rem; }
    .search-bar { max-width: 600px; margin: -30px auto 0; position: relative; z-index: 10; }
    .search-bar input { width: 100%; padding: 1.2rem 1.5rem; border-radius: 50px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.1); font-size: 1rem; outline: none; }
  </style>
</head>
<body>

<nav class="sp-nav sp-nav-dark">
  <a href="../index.html" class="sp-logo">Scholar<span>Path</span></a>
  <ul>
    <li><a href="about.html">About</a></li>
    <li><a href="directory.html">School Directory</a></li>
    <li><a href="share-story.html">Share Story</a></li>
    <li><a href="apply.html">Apply</a></li>
  </ul>
  <a href="donate.html" class="nav-cta">Donate now</a>
</nav>

<div class="directory-hero">
  <p class="eyebrow" style="color: var(--gold);">College Resource Hub</p>
  <h1>Find Your <em>Better</em> Fit</h1>
  <p style="color: rgba(255,255,255,0.7); max-width: 600px; margin: 0 auto;">Combined analytical data and real student "Real Talk" for every major university.</p>

  <div class="filter-bar" style="max-width: 800px; margin: 2rem auto 0; justify-content: center;">
    <button class="filter-btn active" onclick="filterDirectory('all', this)">All</button>
    <button class="filter-btn" onclick="filterDirectory('Public', this)">Public</button>
    <button class="filter-btn" onclick="filterDirectory('Private', this)">Private</button>
    <button class="filter-btn" onclick="filterDirectory('hbcu', this)">HBCUs</button>
    <button class="filter-btn" onclick="filterDirectory('cc', this)">Community Colleges</button>
    <button class="filter-btn" onclick="filterDirectory('la', this)">Liberal Arts</button>
    <button class="filter-btn" onclick="filterDirectory('stem', this)">STEM</button>
  </div>
</div>

<div class="search-bar">
  <input type="text" id="school-search" placeholder="Search schools (e.g. Howard, Berkeley)...">
</div>

<div class="directory-grid" id="directory-grid">
  <!-- Dynamic cards will be injected here -->
</div>

<footer>
  <a href="../index.html" class="logo">Scholar<span style="color:var(--gold);">Path</span></a>
  <span>© 2025 ScholarPath. A 501(c)(3) nonprofit organization.</span>
</footer>

<script>
  let allColleges = [];
  let currentCategory = 'all';

  async function loadDirectory() {
    try {
      const response = await fetch('../js/colleges.json');
      allColleges = await response.json();
      updateDirectory();
    } catch (e) {
      console.error("Error loading directory:", e);
    }
  }

  function updateDirectory() {
    const searchTerm = document.getElementById('school-search').value.toLowerCase();
    
    const filtered = allColleges.filter(c => {
      const matchesSearch = c.full_name.toLowerCase().includes(searchTerm);
      if (!matchesSearch) return false;
      
      if (currentCategory === 'all') return true;
      if (currentCategory === 'Public' || currentCategory === 'Private') return c.type === currentCategory;
      
      const name = c.full_name.toLowerCase();
      if (currentCategory === 'hbcu') return c.id === 'hbcu' || name.includes('hbcu');
      if (currentCategory === 'cc') return name.includes('community college') || name.includes('college system') || c.id.includes('college');
      if (currentCategory === 'stem') return name.includes('technology') || name.includes('polytechnic') || name.includes('science') || name.includes('a&m');
      if (currentCategory === 'la') return name.includes('liberal arts');
      
      return true;
    });
    
    renderCards(filtered);
  }

  function filterDirectory(cat, btn) {
    currentCategory = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateDirectory();
  }

  function renderCards(colleges) {
    const grid = document.getElementById('directory-grid');
    if (colleges.length === 0) {
      grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 2rem; color: var(--muted);">No schools found matching your criteria.</p>';
      return;
    }
    grid.innerHTML = colleges.map(s => {
      let tagClass = s.type === 'Public' ? 'tag-hbcu' : 'tag-la';
      let tagName = s.type;
      const name = s.full_name.toLowerCase();
      if (s.id === 'hbcu' || name.includes('hbcu')) { tagClass = 'tag-hbcu'; tagName = 'HBCU'; }
      else if (name.includes('community college') || name.includes('college system')) { tagClass = 'tag-cc'; tagName = 'Comm. College'; }
      else if (name.includes('technology') || name.includes('polytechnic')) { tagClass = 'tag-stem'; tagName = 'STEM'; }

      return `
      <a href="schools/template.html?school=${s.id}" class="school-card">
        <span class="tag ${tagClass}">${tagName}</span>
        <h3>${s.full_name}</h3>
        <p>Explore official stats and real student talk for ${s.full_name}.</p>
        <div class="card-footer">
          <span style="font-size: 0.75rem; color: var(--muted);">${s.price ? '$' + s.price.toLocaleString() + ' Avg Net' : 'Contact for Price'}</span>
          <span class="view-link">View Profile →</span>
        </div>
      </a>`;
    }).join('');
  }

  document.getElementById('school-search').addEventListener('input', updateDirectory);
  window.addEventListener('DOMContentLoaded', loadDirectory);
</script>

</body>
</html>
